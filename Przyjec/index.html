    <style>
      :root {
        --bg: #fefcf9;
        --bg-elevated: rgba(255, 255, 255, 0.98);
        --bg-panel: rgba(250, 248, 245, 0.95);
        --text: #1f1712;
        --muted: #6b5d4f;
        --gold-rgb: 200, 170, 120;
        --gold: #c8aa78;
        --gold-strong: #e8d8b8;
        --line: rgba(200, 170, 120, 0.2);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        --radius-xl: 28px;
        --nav-height: 80px;
        --content-width: min(1200px, calc(100vw - 4rem));
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
        scrollbar-width: none;
        overflow: hidden;
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        height: 100vh;
        overflow: hidden;
        font-family: "Manrope", sans-serif;
        color: var(--text);
        background: #fefcf9;
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(36, 27, 20, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(184, 139, 47, 0.05) 1px, transparent 1px);
        background-size: 70px 70px;
        pointer-events: none;
        mask-image: radial-gradient(circle at center, black 35%, transparent 90%);
      }

      img {
        max-width: 100%;
        display: block;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .shell {
        position: relative;
        min-height: 100vh;
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .events-background {
        position: fixed;
        inset: 0;
        z-index: 0;
        background-image: url('https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&w=1920&q=80');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      .events-background::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
      }

      .events-content {
        position: relative;
        z-index: 1;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        align-items: center;
        padding: calc(var(--nav-height) + 2rem) 2rem 2rem;
        text-align: center;
        color: white;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      }

      .events-info {
        max-width: 800px;
        margin: 0 auto;
        width: 100%;
        display: flex;
        flex-direction: column;
        flex: 1;
        justify-content: center;
      }

      .events-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(3rem, 6vw, 5rem);
        font-weight: 700;
        margin: 0 0 1.5rem;
        color: white;
      }

      .events-description {
        font-size: clamp(1.1rem, 2vw, 1.4rem);
        line-height: 1.6;
        margin: 0 0 2rem;
        color: rgba(255, 255, 255, 0.95);
      }

      .tiles-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 1.5rem;
        margin: 2rem 0;
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        align-items: stretch;
      }

      .tile {
        padding: 1rem;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: white;
        height: 110px;
        box-sizing: border-box;
      }

      .tile:hover {
        background: rgba(255, 255, 255, 0.25);
        border-color: rgba(255, 255, 255, 0.4);
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }

      .tile-label {
        font-size: 0.9rem;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.9);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0;
        line-height: 1.4;
      }

      .reservation-info {
        margin: 2rem auto 0;
        padding: 1.5rem;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        font-size: 1.1rem;
        color: rgba(255, 255, 255, 0.95);
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: auto;
        width: 100%;
        max-width: 600px;
      }

      .reservation-info:hover {
        background: rgba(255, 255, 255, 0.25);
        border-color: rgba(255, 255, 255, 0.4);
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      }

      .reservation-info a {
        color: rgba(255, 255, 255, 0.95);
        text-decoration: none;
        display: block;
      }

      .page-layout,
      .footer {
        width: var(--content-width);
        margin: 0 auto;
        padding: 0 2rem;
      }

      .brand-copy h1,
      .hero h2,
      .section-card h2,
      .section-card h3,
      .card h3 {
        font-family: "Cormorant Garamond", serif;
      }

      .muted,
      .section-header p,
      .card p,
      .section-card > p {
        color: var(--muted);
      }

      .page-layout {
        display: block;
        padding: calc(var(--nav-height) + 2rem) 0 4rem;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: none;
        place-items: center;
        padding: 1rem;
        background: rgba(0, 0, 0, 0.85);
        overflow-y: auto;
      }

      /* Specjalny tryb dla kalendarza grafiku – bez wewnętrznego scrolla */
      .modal.calendar-modal {
        overflow-y: visible;
      }

      .modal.open {
        display: grid;
      }

      .modal-body {
        width: min(900px, calc(100vw - 2rem));
        max-width: calc(100vw - 2rem);
        max-height: calc(100vh - 2rem);
        overflow-y: auto;
        overflow-x: hidden;
        padding: 1.5rem;
        background: var(--bg-elevated);
        border-radius: var(--radius-xl);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        display: flex;
        flex-direction: column;
      }
      
      /* Kalendarz w grafiku – wszystkie dni muszą mieścić się bez scrolla */
      .calendar-modal-body {
        width: min(750px, calc(100vw - 2rem));
        min-width: min(750px, calc(100vw - 2rem));
        max-width: calc(100vw - 2rem);
        max-height: calc(100vh - 2rem);
        overflow-y: visible;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        padding: 1.5rem;
      }
      
      .calendar-modal-body .modal-header {
        position: relative;
        justify-content: center;
        align-items: center;
      }
      
      .calendar-modal-body .modal-header-left {
        flex: 0 1 auto;
        width: 100%;
        align-items: center;
      }
      
      .calendar-modal-body .modal-header-actions {
        position: absolute;
        top: 0;
        right: 0;
      }
      
      .calendar-modal-body .modal-content {
        display: flex;
        flex-direction: column;
        overflow: visible;
        width: 100%;
      }
      
      .calendar-modal-body .available-dates-list {
        display: flex;
        flex-direction: column;
        overflow: visible;
        width: 100%;
      }
      
      .calendar-modal-body .calendar-container {
        width: fit-content;
        margin: 0 auto;
      }
      
      .calendar-modal-body .calendar-grid {
        width: fit-content;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid rgba(200, 170, 120, 0.2);
        flex-shrink: 0;
      }
      
      .modal-header-left {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        flex: 1;
      }
      
      .modal-header-left h2 {
        margin: 0;
      }

      .modal-header h2 {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2rem, 4vw, 3rem);
        margin: 0;
        color: var(--text);
      }

      .modal-close {
        width: 40px;
        height: 40px;
        padding: 0;
        border: 1px solid rgba(200, 170, 120, 0.5);
        border-radius: 50%;
        background: linear-gradient(135deg, rgba(230, 222, 205, 0.95), rgba(225, 215, 195, 0.92));
        color: #2a241c;
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        line-height: 1;
        flex-shrink: 0;
      }

      .modal-close:hover {
        transform: translateY(-2px) rotate(90deg);
        border-color: rgba(232, 216, 184, 0.95);
        background: linear-gradient(135deg, rgba(240, 235, 225, 0.98), rgba(230, 222, 205, 0.95));
      }

      .modal-content {
        line-height: 1.8;
        color: var(--text);
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 100%;
      }

      .modal-content p {
        margin: 0 0 1rem;
        font-size: 1.1rem;
      }

      .modal-content ul {
        margin: 1rem 0;
        padding-left: 2rem;
      }

      .modal-content li {
        margin: 0.5rem 0;
        font-size: 1.1rem;
      }

      .hall-list {
        display: grid;
        gap: 1.5rem;
        margin-top: 1.5rem;
      }

      .hall-item {
        padding: 1.5rem;
        background: rgba(250, 248, 245, 0.5);
        border-radius: 16px;
        border: 1px solid rgba(200, 170, 120, 0.2);
      }

      .hall-item h3 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        color: var(--text);
      }

      .hall-item p {
        margin: 0.5rem 0;
        color: var(--muted);
      }

      .calendar-container {
        margin-top: 1rem;
        flex-shrink: 0;
      }

      .calendar-controls {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1rem;
        flex-wrap: wrap;
        align-items: center;
      }

      .calendar-controls input {
        padding: 0.6rem 0.75rem;
        border: 1px solid rgba(200, 170, 120, 0.3);
        border-radius: 10px;
        background: rgba(255, 248, 237, 0.88);
        color: #1f1712;
        font-size: 0.9rem;
        flex: 1;
        min-width: 140px;
      }

      .calendar-controls button {
        padding: 0.6rem 1rem;
        border: 1px solid rgba(200, 170, 120, 0.5);
        border-radius: 10px;
        background: linear-gradient(135deg, rgba(230, 222, 205, 0.95), rgba(225, 215, 195, 0.92));
        color: #2a241c;
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        font-weight: 500;
        font-size: 0.85rem;
        white-space: nowrap;
      }

      .calendar-controls button:hover {
        transform: translateY(-2px);
        border-color: rgba(232, 216, 184, 0.95);
        background: linear-gradient(135deg, rgba(240, 235, 225, 0.98), rgba(230, 222, 205, 0.95));
      }


      .time-slots {
        margin-top: 1rem;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
        gap: 0.5rem;
        max-height: 200px;
        overflow-y: auto;
        padding-right: 0.5rem;
      }

      .time-slots::-webkit-scrollbar {
        width: 6px;
      }

      .time-slots::-webkit-scrollbar-track {
        background: rgba(200, 170, 120, 0.1);
        border-radius: 3px;
      }

      .time-slots::-webkit-scrollbar-thumb {
        background: rgba(200, 170, 120, 0.3);
        border-radius: 3px;
      }

      .time-slot {
        padding: 0.6rem 0.5rem;
        border: 1px solid rgba(200, 170, 120, 0.3);
        border-radius: 6px;
        background: rgba(255, 248, 237, 0.88);
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 0.85rem;
      }

      .time-slot:hover {
        background: rgba(200, 170, 120, 0.1);
        border-color: rgba(200, 170, 120, 0.5);
      }

      .time-slot.selected {
        background: var(--gold);
        color: white;
        border-color: var(--gold);
      }

      .time-slot.busy {
        background: rgba(229, 116, 94, 0.2);
        border-color: rgba(229, 116, 94, 0.4);
        cursor: not-allowed;
      }

      .hall-tiles-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 1rem;
        margin-top: 1rem;
      }

      .hall-tile {
        padding: 1rem;
        background: rgba(250, 248, 245, 0.8);
        backdrop-filter: blur(10px);
        border-radius: 16px;
        border: 1px solid rgba(200, 170, 120, 0.3);
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--text);
        height: 110px;
        box-sizing: border-box;
      }

      .hall-tile:hover {
        background: rgba(200, 170, 120, 0.15);
        border-color: rgba(200, 170, 120, 0.5);
        transform: translateY(-4px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      }

      .hall-tile-label {
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0;
        line-height: 1.4;
      }

      .back-button {
        padding: 0.5rem 0.75rem;
        border: 1px solid rgba(200, 170, 120, 0.5);
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(230, 222, 205, 0.95), rgba(225, 215, 195, 0.92));
        color: #2a241c;
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        font-weight: 500;
        font-size: 0.85rem;
        white-space: nowrap;
      }

      .back-button:hover {
        transform: translateY(-2px);
        border-color: rgba(232, 216, 184, 0.95);
        background: linear-gradient(135deg, rgba(240, 235, 225, 0.98), rgba(230, 222, 205, 0.95));
      }

      .filter-toggle-button {
        width: 36px;
        height: 36px;
        padding: 0;
        border: 1px solid rgba(200, 170, 120, 0.5);
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(230, 222, 205, 0.95), rgba(225, 215, 195, 0.92));
        color: #2a241c;
        cursor: pointer;
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        position: relative;
      }

      .modal-header-actions {
        display: flex;
        flex-direction: row;
        gap: 0.5rem;
        align-items: center;
        position: relative;
      }

      .filter-toggle-button:hover {
        transform: translateY(-2px);
        border-color: rgba(232, 216, 184, 0.95);
        background: linear-gradient(135deg, rgba(240, 235, 225, 0.98), rgba(230, 222, 205, 0.95));
      }

      .filter-toggle-button.active {
        background: linear-gradient(135deg, rgba(200, 170, 120, 0.2), rgba(232, 216, 184, 0.25));
        border-color: rgba(200, 170, 120, 0.6);
      }

      .modal-header-top {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .filters-popup {
        position: fixed;
        background: var(--bg-elevated);
        border: 1px solid rgba(200, 170, 120, 0.3);
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        padding: 1.5rem;
        z-index: 210;
        min-width: 300px;
        display: none;
      }

      .filters-popup.open {
        display: block;
      }

      .filters-popup-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid rgba(200, 170, 120, 0.2);
      }

      .filters-popup-header h3 {
        margin: 0;
        font-family: "Cormorant Garamond", serif;
        font-size: 1.5rem;
        color: var(--text);
      }

      .filters-popup-close {
        width: 28px;
        height: 28px;
        padding: 0;
        border: 1px solid rgba(200, 170, 120, 0.3);
        border-radius: 50%;
        background: rgba(250, 248, 245, 0.8);
        color: var(--text);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2rem;

  <body>
    <div id="app"></div>
    <script>
      (() => {
        const app = document.querySelector("#app");
        
        let hallGalleries = {
          "1": [],
          "2": [],
          "3": [],
          "4": [],
          "5": [],
        };

        const isLocalPreview =
          window.location.protocol === "file:" ||
          window.location.hostname === "127.0.0.1" ||
          window.location.hostname === "localhost";
        const fallbackApiBase =
          isLocalPreview
            ? ""
            : window.location.hostname && !window.location.hostname.endsWith("github.io")
              ? "https://api." + window.location.hostname.replace(/^www\./, "")
              : "";

        async function loadHallGalleries() {
          try {
            if (isLocalPreview && !fallbackApiBase) {
              // Fallback dla lokalnego podglądu
              hallGalleries = {
                "1": [
                  { url: "https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=800&q=80", alt: "Sala 1" },
                  { url: "https://images.unsplash.com/photo-1464366400600-7168b8af9bc3?auto=format&fit=crop&w=800&q=80", alt: "Sala 1" },
                ],
                "2": [
                  { url: "https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=800&q=80", alt: "Sala 2" },
                  { url: "https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&w=800&q=80", alt: "Sala 2" },
                ],
                "3": [
                  { url: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=800&q=80", alt: "Sala 3" },
                  { url: "https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=800&q=80", alt: "Sala 3" },
                ],
                "4": [
                  { url: "https://images.unsplash.com/photo-1514933651103-005eec06c04b?auto=format&fit=crop&w=800&q=80", alt: "Sala 4" },
                  { url: "https://images.unsplash.com/photo-1551218808-94e220e084d2?auto=format&fit=crop&w=800&q=80", alt: "Sala 4" },
                ],
                "5": [
                  { url: "https://images.unsplash.com/photo-1511578314322-379afb476865?auto=format&fit=crop&w=800&q=80", alt: "Sala 5" },
                  { url: "https://images.unsplash.com/photo-1505373877841-8d25f7d46678?auto=format&fit=crop&w=800&q=80", alt: "Sala 5" },
                ],
              };
              return;
            }
            const response = await fetch(fallbackApiBase + "/api/public/bootstrap");
            if (!response.ok) {
              throw new Error("Bootstrap unavailable");
            }
            const payload = await response.json();
            if (payload.content?.events?.hallGalleries) {
              hallGalleries = payload.content.events.hallGalleries;
            }
          } catch (error) {
            console.warn("Nie udało się załadować galerii sal:", error);
          }
        }

        function escapeHtml(text) {
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }

        function renderHallGallery(hallNumber, images) {
          const titles = {
            "1": "Sala 1",
            "2": "Sala 2",
            "3": "Sala 3",
            "4": "Sala 4",
            "5": "Sala 5",
          };
          return `
            <div class="modal-body">
              <div class="modal-header">
                <h2>${escapeHtml(titles[hallNumber] || "Galeria Sal")}</h2>
                <button class="modal-close" id="close-gallery" aria-label="Zamknij galerię">×</button>
              </div>
              <div class="gallery-grid">
                ${(images || []).map(img => 
                  `<div class="gallery-item">
                    <img src="${escapeHtml(img.url || img)}" alt="${escapeHtml(img.alt || titles[hallNumber] || "Sala")}" loading="lazy" />
                  </div>`
                ).join('')}
              </div>
            </div>
          `;
        }

        function renderHallsGalleryModal() {
          const allImages = Object.keys(hallGalleries).reduce((acc, hallNum) => {
            const images = hallGalleries[hallNum] || [];
            if (images.length > 0) {
              acc[hallNum] = images;
            }
            return acc;
          }, {});

          if (Object.keys(allImages).length === 0) {
            return `
              <div class="modal-body">
                <div class="modal-header">
                  <h2>Galeria Sal</h2>
                  <button class="modal-close" id="close-gallery" aria-label="Zamknij galerię">×</button>
                </div>
                <div class="modal-content">
                  <p>Brak zdjęć w galerii sal.</p>
                </div>
              </div>
            `;
          }

          return `
            <div class="modal-body">
              <div class="modal-header">
                <h2>Galeria Sal</h2>
                <button class="modal-close" id="close-gallery" aria-label="Zamknij galerię">×</button>
              </div>
              <div class="modal-content">
                ${Object.keys(hallGalleries).map(hallNumber => {
                  const images = hallGalleries[hallNumber] || [];
                  if (images.length === 0) return '';
                  const titles = {
                    "1": "Sala 1",
                    "2": "Sala 2",
                    "3": "Sala 3",
                    "4": "Sala 4",
                    "5": "Sala 5",
                  };
                  return `
                    <div class="gallery-section">
                      <h3 class="gallery-section-title">${escapeHtml(titles[hallNumber] || `Sala ${hallNumber}`)}</h3>
                      <div class="gallery-grid">
                        ${images.map(img => 
                          `<div class="gallery-item">
                            <img src="${escapeHtml(img.url || img)}" alt="${escapeHtml(img.alt || titles[hallNumber] || "Sala")}" loading="lazy" />
                          </div>`
                        ).join('')}
                      </div>
                    </div>
                  `;
                }).filter(section => section !== '').join('')}
              </div>
            </div>
          `;
        }

        function openHallsGallery() {
          modal.innerHTML = renderHallsGalleryModal();
          modal.classList.add("open");
          const closeBtn = modal.querySelector("#close-gallery");
          if (closeBtn) {
            closeBtn.addEventListener("click", closeGallery);
          }
          modal.addEventListener("click", (e) => {
            if (e.target === modal) closeGallery();
          });

          modal.classList.remove("open");

        function formatDateDisplay(dateStr) {
          const date = new Date(dateStr + 'T00:00:00');
          const days = ['Niedziela', 'Poniedziałek', 'Wtorek', 'Środa', 'Czwartek', 'Piątek', 'Sobota'];
          const months = ['stycznia', 'lutego', 'marca', 'kwietnia', 'maja', 'czerwca', 'lipca', 'sierpnia', 'września', 'października', 'listopada', 'grudnia'];
          return `${days[date.getDay()]}, ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }

        function formatDateForMessage(dateStr) {
          const date = new Date(dateStr + 'T00:00:00');
          const day = String(date.getDate()).padStart(2, '0');
          const month = String(date.getMonth() + 1).padStart(2, '0');
          return `${day}.${month}.${date.getFullYear()}`;
        }

        // Cache dla zajętości dat (tylko to co administrator zaznaczy)
        const busyDatesCache = new Map();
        
        function isDateBusy(dateStr, hallNumber) {
          const cacheKey = `${hallNumber}-${dateStr}`;
          // Domyślnie wszystkie daty są wolne, chyba że administrator je oznaczy jako zajęte
          return busyDatesCache.get(cacheKey) || false;
        }

        let displayedDatesCount = 7; // Początkowo pokazuj 7 dni
        
        async function loadAvailableDates(hallNumber, dateFrom, dateTo, limit = null) {
          // W rzeczywistości pobierane z API - tutaj tylko lokalne dane
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const dates = [];
          
          // Oblicz datę końcową - zawsze 5 lat od bieżącego miesiąca
          const endDate = new Date(today);
          endDate.setFullYear(today.getFullYear() + 5);
          endDate.setMonth(today.getMonth());
          endDate.setDate(0); // Ostatni dzień miesiąca 5 lat później
          
          const currentDate = new Date(today);
          let count = 0;
          
          while (currentDate <= endDate) {
            const dateStr = currentDate.toISOString().slice(0, 10);
            
            if (dateFrom && new Date(dateFrom) > currentDate) {
              currentDate.setDate(currentDate.getDate() + 1);
              continue;
            }
            if (dateTo && new Date(dateTo) < currentDate) {
              break;
            }
            
            // Sprawdź czy administrator oznaczył datę jako zajętą
            const isBusy = isDateBusy(dateStr, hallNumber);
            
            dates.push({
              date: dateStr,
              busy: isBusy,
              availableHours: isBusy ? [] : generateAvailableHours()
            });
            
            count++;
            if (limit && count >= limit) {
              break;
            }
            
            currentDate.setDate(currentDate.getDate() + 1);
          }
          
          return dates.sort((a, b) => a.date.localeCompare(b.date));
        }

        function generateAvailableHours() {
          const hours = [];
          // Generuj wszystkie godziny (0:00 - 23:30)
          for (let hour = 0; hour < 24; hour++) {
            hours.push(`${String(hour).padStart(2, '0')}:00`);
            hours.push(`${String(hour).padStart(2, '0')}:30`);
          }
          return hours;
        }

        function generateHourSlots(dateStr, hallNumber) {
          const slots = [];
          // Generuj sloty co 30 minut od 0:00 do 23:30 (całe 24h)
          for (let hour = 0; hour < 24; hour++) {
            slots.push({ time: `${String(hour).padStart(2, '0')}:00`, busy: Math.random() < 0.15 });
            slots.push({ time: `${String(hour).padStart(2, '0')}:30`, busy: Math.random() < 0.15 });
          }
          return slots;
        }

        function renderAvailableDates(dates, hasMore = false) {
          if (dates.length === 0) {
            return '<p style="text-align: center; color: var(--muted); padding: 2rem;">Brak dostępnych terminów w wybranym zakresie.</p>';
          }
          
          // Utwórz mapę wszystkich dat dla szybkiego wyszukiwania
          const datesMap = new Map();
          dates.forEach(date => {
            datesMap.set(date.date, date);
          });
          
          // Znajdź zakres dat (pierwsza i ostatnia)
          const firstDate = new Date(dates[0].date + 'T00:00:00');
          const lastDate = new Date(dates[dates.length - 1].date + 'T00:00:00');
          
          // Ustaw aktualnie wyświetlany miesiąc (jeśli nie jest ustawiony, użyj pierwszego miesiąca z zakresu)
          if (!currentMonthView) {
            currentMonthView = new Date(firstDate);
            currentMonthView.setDate(1);
          }
          
          // Sprawdź czy aktualny miesiąc jest w zakresie
          const currentMonthStart = new Date(currentMonthView.getFullYear(), currentMonthView.getMonth(), 1);
          const currentMonthEnd = new Date(currentMonthView.getFullYear(), currentMonthView.getMonth() + 1, 0);
          
          // Jeśli aktualny miesiąc jest przed zakresem, ustaw na pierwszy miesiąc
          if (currentMonthEnd < firstDate) {
            currentMonthView = new Date(firstDate);
            currentMonthView.setDate(1);
          }
          // Jeśli aktualny miesiąc jest po zakresie, ustaw na ostatni miesiąc
          else if (currentMonthStart > lastDate) {
            currentMonthView = new Date(lastDate);
            currentMonthView.setDate(1);
          }
          
          const year = currentMonthView.getFullYear();
          const month = currentMonthView.getMonth();
          
          const firstDay = new Date(year, month, 1);
          const lastDay = new Date(year, month + 1, 0);
          const daysInMonth = lastDay.getDate();
          const startingDayOfWeek = firstDay.getDay();
          
          // Sprawdź czy można przejść do poprzedniego/następnego miesiąca
          const canGoPrev = currentMonthStart > firstDate;
          const canGoNext = currentMonthEnd < lastDate;
          
          const monthNames = ['Styczeń', 'Luty', 'Marzec', 'Kwiecień', 'Maj', 'Czerwiec', 'Lipiec', 'Sierpień', 'Wrzesień', 'Październik', 'Listopad', 'Grudzień'];
            const dayNames = ['Nd', 'Pn', 'Wt', 'Śr', 'Cz', 'Pt', 'Sb'];
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          
          let calendarGrid = '<div class="calendar-grid">';
          
          // Nagłówki dni tygodnia
          dayNames.forEach(dayName => {
            calendarGrid += `<div class="calendar-day-header">${dayName}</div>`;
          });
          
          // Puste komórki przed pierwszym dniem miesiąca
          for (let i = 0; i < startingDayOfWeek; i++) {
            calendarGrid += '<div class="calendar-day disabled"></div>';
          }
          
          // Dni miesiąca
          for (let day = 1; day <= daysInMonth; day++) {
            const currentDate = new Date(year, month, day);
            const dateStr = currentDate.toISOString().slice(0, 10);
            const dateData = datesMap.get(dateStr);
            const isToday = dateStr === today.toISOString().slice(0, 10);
            const isPast = currentDate < today;
            const isSelected = dateStr === selectedDate;
            
            // Sprawdź czy data jest w zakresie dostępnych dat
            const isInRange = dateStr >= dates[0].date && dateStr <= dates[dates.length - 1].date;
            
            let dayClasses = 'calendar-day';
            if (isPast || !isInRange) dayClasses += ' disabled';
            if (dateData?.busy) dayClasses += ' busy';
            if (isSelected) dayClasses += ' selected';
            if (isToday) dayClasses += ' today';
            
            const statusText = dateData?.busy ? 'Zajęte' : '';
            
            calendarGrid += `
              <div class="${dayClasses}" data-date="${dateStr}" ${isPast || dateData?.busy || !isInRange ? '' : 'style="cursor: pointer;"'}>
                <div class="calendar-day-number">${day}</div>
                ${statusText ? `<div class="calendar-day-status">${statusText}</div>` : ''}
              </div>
            `;
          }
          
          // Puste komórki po ostatnim dniu miesiąca, aby zawsze było 6 pełnych tygodni (42 komórki)
          // 7 nagłówków + puste przed + dni miesiąca = już wygenerowane komórki
          const totalCellsSoFar = 7 + startingDayOfWeek + daysInMonth; // nagłówki + puste przed + dni
          const totalCellsNeeded = 7 + (7 * 6); // nagłówki + 6 tygodni × 7 dni
          const emptyCellsAfter = Math.max(0, totalCellsNeeded - totalCellsSoFar);
          
          for (let i = 0; i < emptyCellsAfter; i++) {
            calendarGrid += '<div class="calendar-day disabled"></div>';
          }
          
          calendarGrid += '</div>';
          
          // Generuj opcje dla dropdowna roku (od pierwszego roku w zakresie do ostatniego + 5 lat w przód)
          const firstYear = new Date(dates[0].date + 'T00:00:00').getFullYear();
          const lastYear = new Date(dates[dates.length - 1].date + 'T00:00:00').getFullYear();
          const maxYear = Math.max(lastYear, new Date().getFullYear() + 5);
          const yearOptions = [];
          for (let y = firstYear; y <= maxYear; y++) {
            yearOptions.push(y);
          }
          
          const calendarHTML = `
            <div class="calendar-container">
              ${calendarGrid}
            </div>
          `;
          
          // Aktualizuj nowy interfejs wyboru miesiąca i roku
          const monthDisplay = modal.querySelector("#calendar-month-display");
          const yearDisplay = modal.querySelector("#calendar-year-display");
          const monthDropdown = modal.querySelector("#calendar-month-dropdown");
          const yearDropdown = modal.querySelector("#calendar-year-dropdown");
          const prevButton = modal.querySelector("#calendar-prev-month");
          const nextButton = modal.querySelector("#calendar-next-month");
          
          if (monthDisplay) {
            monthDisplay.textContent = monthNames[month];
          }
          
          if (yearDisplay) {
            yearDisplay.textContent = year;
          }
          
          if (monthDropdown) {
            monthDropdown.innerHTML = monthNames.map((name, idx) => 
              `<div class="calendar-month-option ${idx === month ? 'selected' : ''}" data-month="${idx}">${name}</div>`
            ).join('');
          }
          
          if (yearDropdown) {
            yearDropdown.innerHTML = yearOptions.map(y => 
              `<div class="calendar-year-option ${y === year ? 'selected' : ''}" data-year="${y}">${y}</div>`
            ).join('');
          }
          
          // Aktualizuj stan przycisków nawigacyjnych
          if (prevButton) {
            prevButton.disabled = !canGoPrev;
          }
          if (nextButton) {
            nextButton.disabled = !canGoNext;
          }
          
          return calendarHTML;
        }

        function initCustomDatePickers() {

          const fromPicker = modal.querySelector("#picker-filter-date-from");
          if (fromInput && fromPicker) {
            const initialDate = today.toISOString().slice(0, 10);
            fromInput.value = formatDateInput(initialDate);
            fromInput.dataset.value = initialDate;
            renderCustomDatePicker(fromPicker, initialDate, (date) => {
              fromInput.value = formatDateInput(date);
              fromInput.dataset.value = date;
              fromPicker.classList.remove("open");
            });
            
            const updateFromPickerPosition = () => {
              if (fromInput && fromPicker) {
                const rect = fromInput.getBoundingClientRect();
                fromPicker.style.top = `${rect.bottom + 8}px`;
                fromPicker.style.left = `${rect.left}px`;
              }
            };
            
            // Obsługa kliknięcia w ikonę kalendarza
            modal.querySelector(`[data-target="filter-date-from"]`)?.addEventListener("click", (e) => {
              e.stopPropagation();
              updateFromPickerPosition();
              fromPicker.classList.toggle("open");
            });
            
            // Obsługa kliknięcia w całe pole daty
            fromInput?.addEventListener("click", (e) => {
              e.stopPropagation();
              updateFromPickerPosition();
              fromPicker.classList.toggle("open");
            });
            
            // Aktualizuj pozycję przy scrollowaniu
            window.addEventListener("scroll", updateFromPickerPosition, true);
            window.addEventListener("resize", updateFromPickerPosition);

          // Inicjalizuj kalendarz "Do"

          const toPicker = modal.querySelector("#picker-filter-date-to");
          if (toInput && toPicker) {
            const initialDate = futureDate.toISOString().slice(0, 10);
            toInput.value = formatDateInput(initialDate);
            toInput.dataset.value = initialDate;
            renderCustomDatePicker(toPicker, initialDate, (date) => {
              toInput.value = formatDateInput(date);
              toInput.dataset.value = date;
              toPicker.classList.remove("open");
            });
            
            const updateToPickerPosition = () => {
              if (toInput && toPicker) {
                const rect = toInput.getBoundingClientRect();
                toPicker.style.top = `${rect.bottom + 8}px`;
                toPicker.style.left = `${rect.left}px`;
              }
            };
            
            // Obsługa kliknięcia w ikonę kalendarza
            modal.querySelector(`[data-target="filter-date-to"]`)?.addEventListener("click", (e) => {
              e.stopPropagation();
              updateToPickerPosition();
              toPicker.classList.toggle("open");
            });
            
            // Obsługa kliknięcia w całe pole daty
            toInput?.addEventListener("click", (e) => {
              e.stopPropagation();
              updateToPickerPosition();
              toPicker.classList.toggle("open");
            });
            
            // Aktualizuj pozycję przy scrollowaniu
            window.addEventListener("scroll", updateToPickerPosition, true);
            window.addEventListener("resize", updateToPickerPosition);
          }
          
          // Zamknij kalendarze po kliknięciu poza nimi
          const closeCalendarsHandler = (e) => {
            if (fromPicker && !fromPicker.contains(e.target) && !fromInput?.contains(e.target) && !e.target.closest(`[data-target="filter-date-from"]`)) {
              fromPicker.classList.remove("open");
            }
            if (toPicker && !toPicker.contains(e.target) && !toInput?.contains(e.target) && !e.target.closest(`[data-target="filter-date-to"]`)) {
              toPicker.classList.remove("open");
            }
          };
          
          // Użyj capture phase, aby przechwycić kliknięcia przed innymi handlerami
          document.addEventListener("click", closeCalendarsHandler, true);
        }

        function formatDateInput(dateStr) {
          const date = new Date(dateStr + 'T00:00:00');
          const day = String(date.getDate()).padStart(2, '0');
          const month = String(date.getMonth() + 1).padStart(2, '0');
          const year = date.getFullYear();
          return `${day}.${month}.${year}`;
        }

        function renderCustomDatePicker(container, selectedDate, onSelect) {
          const date = new Date(selectedDate + 'T00:00:00');
          const currentYear = date.getFullYear();
          const currentMonth = date.getMonth();
          const selectedDateStr = selectedDate;
          
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          
          const months = ['Styczeń', 'Luty', 'Marzec', 'Kwiecień', 'Maj', 'Czerwiec', 'Lipiec', 'Sierpień', 'Wrzesień', 'Październik', 'Listopad', 'Grudzień'];
          const dayNames = ['Pn', 'Wt', 'Śr', 'Cz', 'Pt', 'Sb', 'Nd'];
          
          // Generuj lata - zawsze 5 lat od bieżącego miesiąca
          const years = [];
          const startYear = today.getFullYear();
          const endYear = startYear + 5;
          for (let year = startYear; year <= endYear; year++) {
            years.push(year);
          }
          
          // Jeśli wybrany rok jest poza zakresem, dodaj go do listy
          if (currentYear > endYear) {
            years.push(currentYear);
          }
          
          // Generuj dni miesiąca
          const firstDay = new Date(currentYear, currentMonth, 1);
          const lastDay = new Date(currentYear, currentMonth + 1, 0);
          const daysInMonth = lastDay.getDate();
          const startingDayOfWeek = (firstDay.getDay() + 6) % 7; // Poniedziałek = 0
          
          let calendarHTML = `
            <div class="date-picker-header">
              <div class="date-picker-nav">
                <button class="date-picker-nav-btn" data-action="prev-month">‹</button>
                <div class="date-picker-month-year">
                  <select class="date-picker-month-select" data-action="change-month">
                    ${months.map((month, idx) => `<option value="${idx}" ${idx === currentMonth ? 'selected' : ''}>${month}</option>`).join('')}
                  </select>
                  <select class="date-picker-year-select" data-action="change-year">
                    ${years.map(year => `<option value="${year}" ${year === currentYear ? 'selected' : ''}>${year}</option>`).join('')}
                  </select>
                </div>
                <button class="date-picker-nav-btn" data-action="next-month">›</button>
              </div>
            </div>
            <div class="date-picker-grid">
              ${dayNames.map(day => `<div class="date-picker-day-header">${day}</div>`).join('')}
          `;
          
          // Dni z poprzedniego miesiąca
          const prevMonth = currentMonth === 0 ? 11 : currentMonth - 1;
          const prevYear = currentMonth === 0 ? currentYear - 1 : currentYear;
          const daysInPrevMonth = new Date(prevYear, prevMonth + 1, 0).getDate();
          
          for (let i = startingDayOfWeek - 1; i >= 0; i--) {
            const day = daysInPrevMonth - i;
            const dateStr = `${prevYear}-${String(prevMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            calendarHTML += `<div class="date-picker-day other-month" data-date="${dateStr}">${day}</div>`;
          }
          
          // Dni bieżącego miesiąca
          for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const dateObj = new Date(dateStr + 'T00:00:00');
            const isToday = dateObj.getTime() === today.getTime();
            const isSelected = dateStr === selectedDateStr;
            const classes = ['date-picker-day'];
            if (isToday) classes.push('today');
            if (isSelected) classes.push('selected');
            
            calendarHTML += `<div class="${classes.join(' ')}" data-date="${dateStr}">${day}</div>`;
          }
          
          // Dni z następnego miesiąca
          const totalCells = 42;
          const cellsUsed = startingDayOfWeek + daysInMonth;
          const nextMonth = currentMonth === 11 ? 0 : currentMonth + 1;
          const nextYear = currentMonth === 11 ? currentYear + 1 : currentYear;
          
          for (let day = 1; day <= totalCells - cellsUsed; day++) {
            const dateStr = `${nextYear}-${String(nextMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            calendarHTML += `<div class="date-picker-day other-month" data-date="${dateStr}">${day}</div>`;
          }
          
          calendarHTML += '</div>';
          container.innerHTML = calendarHTML;
          
          // Obsługa nawigacji
          container.querySelector('[data-action="prev-month"]')?.addEventListener("click", () => {
            const newDate = new Date(currentYear, currentMonth - 1, 1);
            renderCustomDatePicker(container, newDate.toISOString().slice(0, 10), onSelect);
          });
          
          container.querySelector('[data-action="next-month"]')?.addEventListener("click", () => {
            const newDate = new Date(currentYear, currentMonth + 1, 1);
            renderCustomDatePicker(container, newDate.toISOString().slice(0, 10), onSelect);
          });
          
          container.querySelector('.date-picker-month-select')?.addEventListener("change", (e) => {
            const newDate = new Date(currentYear, parseInt(e.target.value), 1);
            renderCustomDatePicker(container, newDate.toISOString().slice(0, 10), onSelect);
          });
          
          container.querySelector('.date-picker-year-select')?.addEventListener("change", (e) => {
            const selectedYear = parseInt(e.target.value);
            const newDate = new Date(selectedYear, currentMonth, 1);
            
            // Jeśli wybrano ostatni rok z listy, dodaj kolejny rok
            const yearSelect = e.target;
            const maxYear = Math.max(...Array.from(yearSelect.options).map(opt => parseInt(opt.value)));
            if (selectedYear >= maxYear) {
              const newYear = maxYear + 1;
              yearSelect.innerHTML += `<option value="${newYear}">${newYear}</option>`;
            }
            
            renderCustomDatePicker(container, newDate.toISOString().slice(0, 10), onSelect);
          });
          
          // Obsługa wyboru daty
          container.querySelectorAll('.date-picker-day').forEach(dayEl => {
            dayEl.addEventListener("click", (e) => {
              e.stopPropagation();
              const dateStr = dayEl.dataset.date;
              if (dateStr) {
                onSelect(dateStr);
              }
            });
          });
          
          // Zapobiegaj zamykaniu kalendarza przy kliknięciu w niego
          container.addEventListener("click", (e) => {
            e.stopPropagation();
          });
        }

        async function loadAndDisplayDates(resetCount = true) {
          if (resetCount) {
            displayedDatesCount = 7;
            currentMonthView = null; // Resetuj widok miesiąca
          }
          
          const listContainer = modal.querySelector("#available-dates-list");
          if (resetCount) {
            listContainer.innerHTML = '<p style="text-align: center; color: var(--muted); padding: 2rem;">Ładowanie dostępnych terminów...</p>';
          }
          
          // Załaduj wszystkie dostępne daty (bez filtrów)
          const allDates = await loadAvailableDates(selectedHall, null, null);
          
          availableDates = allDates;
          
          // Jeśli resetujemy lub nie ma ustawionego miesiąca, ustaw aktualny miesiąc na pierwszy miesiąc z zakresu
          if ((resetCount || !currentMonthView) && allDates.length > 0) {
            const firstDate = new Date(allDates[0].date + 'T00:00:00');
            currentMonthView = new Date(firstDate);
            currentMonthView.setDate(1);
          }
          
          listContainer.innerHTML = renderAvailableDates(allDates, false);
          
          // Obsługa nowego interfejsu wyboru miesiąca i roku
          const setupCalendarNavigation = () => {
            const prevButton = modal.querySelector("#calendar-prev-month");
            const nextButton = modal.querySelector("#calendar-next-month");
            const monthWrapper = modal.querySelector("#calendar-month-wrapper");
            const monthDropdown = modal.querySelector("#calendar-month-dropdown");
            const yearWrapper = modal.querySelector("#calendar-year-wrapper");
            const yearDropdown = modal.querySelector("#calendar-year-dropdown");
            const monthOptions = modal.querySelectorAll(".calendar-month-option");
            const yearOptions = modal.querySelectorAll(".calendar-year-option");
            
            // Przycisk poprzedni miesiąc
            if (prevButton) {
              prevButton.onclick = (e) => {
                e.stopPropagation();
                if (currentMonthView) {
                  currentMonthView.setMonth(currentMonthView.getMonth() - 1);
                  listContainer.innerHTML = renderAvailableDates(allDates, false);
                  setupCalendarNavigation();
                }
              };
            }
            
            // Przycisk następny miesiąc
            if (nextButton) {
              nextButton.onclick = (e) => {
                e.stopPropagation();
                if (currentMonthView) {
                  currentMonthView.setMonth(currentMonthView.getMonth() + 1);
                  listContainer.innerHTML = renderAvailableDates(allDates, false);
                  setupCalendarNavigation();
                }
              };
            }
            
            // Dropdown miesiąca - otwieranie/zamykanie
            if (monthWrapper && monthDropdown) {
              const toggleMonthDropdown = (e) => {
                e.stopPropagation();
                monthWrapper.classList.toggle('active');
                // Zamknij dropdown roku jeśli jest otwarty
                if (yearWrapper) {
                  yearWrapper.classList.remove('active');
                }
              };
              
              const monthDisplay = modal.querySelector("#calendar-month-display");
              if (monthDisplay) {
                monthDisplay.onclick = toggleMonthDropdown;
              }
              
              // Obsługa wyboru miesiąca
              monthOptions.forEach(option => {
                option.onclick = (e) => {
                  e.stopPropagation();
                  const selectedMonth = parseInt(option.dataset.month);
                  if (currentMonthView) {
                    currentMonthView.setMonth(selectedMonth);
                    listContainer.innerHTML = renderAvailableDates(allDates, false);
                    setupCalendarNavigation();
                    monthWrapper.classList.remove('active');
                  }
                };
              });
            }
            
            // Dropdown roku - otwieranie/zamykanie
            if (yearWrapper && yearDropdown) {
              const toggleYearDropdown = (e) => {
                e.stopPropagation();
                yearWrapper.classList.toggle('active');
                // Zamknij dropdown miesiąca jeśli jest otwarty
                if (monthWrapper) {
                  monthWrapper.classList.remove('active');
                }
              };
              
              const yearDisplay = modal.querySelector("#calendar-year-display");
              if (yearDisplay) {
                yearDisplay.onclick = toggleYearDropdown;
              }
              
              // Obsługa wyboru roku
              yearOptions.forEach(option => {
                option.onclick = (e) => {
                  e.stopPropagation();
                  const selectedYear = parseInt(option.dataset.year);
                  if (currentMonthView) {
                    currentMonthView.setFullYear(selectedYear);
                    listContainer.innerHTML = renderAvailableDates(allDates, false);
                    setupCalendarNavigation();
                    yearWrapper.classList.remove('active');
                  }
                };
              });
            }
            
            // Zamykanie dropdownów po kliknięciu poza nimi
            const closeDropdowns = (e) => {
              if (monthWrapper && !monthWrapper.contains(e.target)) {
                monthWrapper.classList.remove('active');
              }
              if (yearWrapper && !yearWrapper.contains(e.target)) {
                yearWrapper.classList.remove('active');
              }
            };
            
            // Usuń poprzednie event listenery i dodaj nowy
            document.removeEventListener('click', closeDropdowns);
            document.addEventListener('click', closeDropdowns);
          };
          
          setupCalendarNavigation();
        }

        function updateTimeSelection(startTime, endTime, slots) {
          const slotsGrid = modal.querySelector("#hour-slots-grid");
          if (!slotsGrid) return;
          
          const startIndex = slots.findIndex(s => s.time === startTime);
          const endIndex = slots.findIndex(s => s.time === endTime);
          if (startIndex === -1 || endIndex === -1) return;
          
          const minIndex = Math.min(startIndex, endIndex);
          const maxIndex = Math.max(startIndex, endIndex);
          
          const allSlots = Array.from(slotsGrid.querySelectorAll(".hour-slot"));
          allSlots.forEach((slot, index) => {
            if (index >= minIndex && index <= maxIndex && !slot.classList.contains("busy")) {
              slot.classList.add("selected");
            } else if (!slot.classList.contains("busy") && index < minIndex) {
              slot.classList.remove("selected");
            }
          });
        }

        function finalizeTimeSelection(slots) {
          const slotsGrid = modal.querySelector("#hour-slots-grid");
          if (!slotsGrid) return;
          
          const selectedSlots = Array.from(slotsGrid.querySelectorAll(".hour-slot.selected"))
            .map(slot => slot.dataset.time)
            .sort();
          
          if (selectedSlots.length === 0) {
            selectedTimeRanges = [];
            updateSelectedRanges();
            updateReserveButton();
            return;
          }
          
          // Grupuj w zakresy
          const ranges = [];
          let rangeStart = selectedSlots[0];
          let rangeEnd = selectedSlots[0];
          
          for (let i = 1; i < selectedSlots.length; i++) {
            const current = timeToMinutes(selectedSlots[i]);
            const prev = timeToMinutes(selectedSlots[i-1]);
            
            if (current - prev === 30) {
              rangeEnd = selectedSlots[i];
            } else {
              ranges.push({ from: rangeStart, to: rangeEnd });
              rangeStart = selectedSlots[i];
              rangeEnd = selectedSlots[i];
            }
          }
          ranges.push({ from: rangeStart, to: rangeEnd });
          
          selectedTimeRanges = ranges;
          updateSelectedRanges();
          updateReserveButton();
        }

        function areTimeRangesContinuous() {
          if (selectedTimeRanges.length === 0) return false;
          if (selectedTimeRanges.length === 1) return true;
          
          // Sprawdź czy wszystkie zakresy są ciągłe (jeden po drugim)
          for (let i = 1; i < selectedTimeRanges.length; i++) {
            const prevEnd = timeToMinutes(selectedTimeRanges[i-1].to);
            const currentStart = timeToMinutes(selectedTimeRanges[i].from);
            
            // Jeśli między końcem poprzedniego a początkiem obecnego jest więcej niż 30 minut, to nie są ciągłe
            if (currentStart - prevEnd > 30) {
              return false;
            }
          }
          
          return true;
        }

        function timeToMinutes(timeStr) {
          const [hours, minutes] = timeStr.split(':').map(Number);
          return hours * 60 + minutes;
        }

        function updateSelectedRanges() {
          const container = modal?.querySelector("#selected-ranges");
          if (!container) return;
          
          if (selectedTimeRanges.length === 0) {
            container.innerHTML = '<div class="selected-ranges empty">Nie zaznaczono żadnego zakresu godzinowego</div>';
          } else {
            container.innerHTML = selectedTimeRanges.map(range => 
              `<span class="selected-range-item">${range.from} - ${range.to}</span>`
            ).join('');
          }
        }

        function updateReserveButton() {
          const btn = modal?.querySelector("#reserve-button");
          if (btn) {
            // Przycisk aktywny zawsze gdy jest wybrany dzień (godziny są opcjonalne)
            btn.disabled = !selectedDate;
          }
        }

        function redirectToContact() {
          // Formatuj wiadomość
          const dateFormatted = formatDateForMessage(selectedDate);
          
          // Sprawdź czy zakresy godzinowe są ciągłe
          const isContinuous = selectedTimeRanges.length > 0 && areTimeRangesContinuous();
          
          let message;
          if (isContinuous) {
            // Jeśli zakresy są ciągłe, formatuj z godzinami
            const rangesText = selectedTimeRanges.map((range, index) => {
              const fromParts = range.from.split(':');
              // Dla "do" dodajemy 15 minut
              const toMinutes = timeToMinutes(range.to) + 15;
              const toHours = Math.floor(toMinutes / 60);
              const toMins = toMinutes % 60;
              const toTime = `${String(toHours).padStart(2, '0')}:${String(toMins).padStart(2, '0')}`;
              const rangeText = `od godziny ${fromParts[0]}:${fromParts[1]} do godziny ${toTime}`;
              return index === 0 ? rangeText : ` oraz ${rangeText}`;
            }).join('');
            
            message = `Dzień dobry. Jestem zainteresowany/na wynajęciem sali nr ${selectedHall}, dnia ${dateFormatted}, ${rangesText}. Proszę o kontakt w celu ustalenia szczegółów.`;
          } else {
            // Jeśli zakresy NIE są ciągłe lub brak zakresów, tylko dzień bez godzin
            message = `Dzień dobry. Jestem zainteresowany/na wynajęciem sali nr ${selectedHall}, dnia ${dateFormatted}. Proszę o kontakt w celu ustalenia szczegółów.`;
          }
          
          // Przekieruj do kontaktu z parametrami URL
          const params = new URLSearchParams({
            topic: 'Przyjecia',
            message: message
          });
          
          window.location.href = `../kontakt/index.html?${params.toString()}`;
        }

        function closeModal() {
          modal.classList.remove("open");
          modal.classList.remove("calendar-modal");
          modal.innerHTML = '';
        }

        // Inicjalizacja po załadowaniu danych
        loadHallGalleries().then(() => {
          // Obsługa kliknięć w kafelki
          document.querySelectorAll(".tile").forEach(tile => {
            tile.addEventListener("click", () => {
              const modalType = tile.dataset.modal;
              const link = tile.dataset.link;
              if (modalType) {
                openModal(modalType);
              } else if (link) {
                window.location.href = link;
              }
            });
          });
        });

        // Obsługa kliknięcia w informację o rezerwacji
        const reservationInfo = document.querySelector(".reservation-info");
        if (reservationInfo) {
          reservationInfo.addEventListener("click", () => {
            window.location.href = "../kontakt/index.html";
          });
        }

        const nav = document.querySelector("#floating-nav");
        const handleScroll = () => {
          if (window.scrollY > 50) {
            nav.classList.add("scrolled");
          } else {
            nav.classList.remove("scrolled");
          }
        };
        window.addEventListener("scroll", handleScroll, { passive: true });
      })();
    </script>
    <a href="../kontakt/index.html" class="floating-contact-button" aria-label="Kontakt">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </a>
